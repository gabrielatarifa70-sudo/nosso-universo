<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriela & Vitória 🖤</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #0f0f0f, #1a001f);
    color: white;
    text-align: center;
    overflow-x: hidden;
}
#conteudo { position: relative; min-height: 600px; }
header { padding: 40px; }
h1 { font-size: 2.5em; color: #c77dff; }
nav { margin: 20px 0; }
nav button {
    background: #5e0b15;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 20px;
}
section {
    display: none;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    padding: 20px;
}
section.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}
textarea {
    width: 80%;
    height: 80px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}
input, select {
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}
button.save { background: #c77dff; }
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}
.galeria {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
}
.galeria img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 12px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="login">
    <h2>🖤 Área Secreta</h2>
    <input type="password" id="senhaInput" placeholder="Palavra secreta">
    <button onclick="verificarSenha()">Entrar</button>
    <p id="erroSenha" style="color:red;"></p>
</div>

<div id="conteudo" style="display:none;">

<header>
<h1>Gabriela & Vitória 🖤</h1>
<p id="contadorTempo"></p>
</header>

<nav>
<button onclick="show('inicio')">Início</button>
<button onclick="show('galeria')">Memórias</button>
<button onclick="show('desabafos')">Desabafos</button>
<button onclick="show('recados')">Recadinhos</button>
<button onclick="show('humor')">Humor</button>
</nav>

<section id="inicio" class="active">
<div class="card">
<h2>Desde 14/10/2025 💜</h2>
<span id="contadorTempo"></span>
</div>
</section>

<section id="galeria">
<div class="card">
<h2>Nossas Memórias</h2>
<div class="galeria">
<img src="fotos/foto1.jpg">
<img src="fotos/foto2.jpg">
<img src="fotos/foto3.jpg">
</div>
</div>
</section>

<section id="recados">
<div class="card">
<h2>Bilhetes que ficam</h2>
<input type="text" id="recadoInput" placeholder="Escreva um recadinho">
<button class="save" onclick="salvarRecado()">Adicionar</button>
<div id="listaRecados"></div>
</div>
</section>

</div>

<script>
function show(id){
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function verificarSenha(){
    if(document.getElementById("senhaInput").value === "1410"){
        document.getElementById("login").style.display = "none";
        document.getElementById("conteudo").style.display = "block";
    } else {
        document.getElementById("erroSenha").innerText = "Senha incorreta 🖤";
    }
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAcTkEQd4hysYz9X1gvT1AVrfBfDjo1W3U",
authDomain: "nosso-universo-a50d4.firebaseapp.com",
projectId: "nosso-universo-a50d4",
storageBucket: "nosso-universo-a50d4.firebasestorage.app",
messagingSenderId: "798462200813",
appId: "1:798462200813:web:a2232402a35752d3d8f5e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvarRecado = async function() {
const texto = document.getElementById("recadoInput").value;
if (!texto) return;

await addDoc(collection(db, "recados"), {
texto: texto,
criadoEm: new Date()
});

document.getElementById("recadoInput").value = "";
};

const q = query(collection(db, "recados"), orderBy("criadoEm"));

onSnapshot(q, (snapshot) => {
const lista = document.getElementById("listaRecados");
lista.innerHTML = "";

snapshot.forEach((doc) => {
const div = document.createElement("div");
div.className = "card";
div.innerText = "💌 " + doc.data().texto;
lista.appendChild(div);
});
});
</script>

</body>
</html>
