<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriela & Vitória 🖤</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #0f0f0f, #1a001f);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

#conteudo { position: relative; min-height: 600px; }
header { padding: 40px; }
h1 { font-size: 2.5em; color: #c77dff; }

nav { margin: 20px 0; }
nav button {
    background: #5e0b15;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 20px;
}

section {
    display: none;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    padding: 20px;
}
section.active { display: block; opacity: 1; transform: translateY(0); }

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}

textarea { width: 80%; height: 80px; border-radius: 10px; border: none; padding: 10px; }
input, select { padding: 8px; border-radius: 10px; border: none; margin: 5px; }
button.save { background: #c77dff; }

canvas { position: fixed; top: 0; left: 0; z-index: -1; }

#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}
#login input { padding: 10px; border-radius: 10px; border: none; margin: 10px; }
#login button { padding: 8px 15px; border-radius: 10px; border: none; background: #c77dff; cursor: pointer; }

.galeria { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.galeria img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.3s ease, opacity 0.3s ease;
}
.galeria img:hover { transform: scale(1.05); opacity: 0.9; }
</style>
</head>

<body>
<canvas id="stars"></canvas>

<div id="login">
    <h2>🖤 Área Secreta</h2>
    <p>Digite a nossa palavra secreta</p>
    <input type="password" id="senhaInput">
    <button onclick="verificarSenha()">Entrar</button>
    <p id="erroSenha" style="color:red;"></p>
</div>

<div id="conteudo" style="display:none;">

<header>
<h1>Gabriela & Vitória 🖤</h1>
<p>Entre todos os mundos possíveis, eu escolheria você em todos.</p>
</header>

<nav>
<button onclick="show('inicio')">Início</button>
<button onclick="show('galeria')">Memórias</button>
<button onclick="show('desabafos')">Desabafos</button>
<button onclick="show('recados')">Recadinhos</button>
<button onclick="show('humor')">Humor</button>
</nav>

<section id="inicio" class="active">
<div class="card">
<h2>
Desde 14/10/2025 💜  
<br>Estamos juntas há  
<br><span id="contadorTempo"></span>
</h2>
<p>O dia em que tudo começou.</p>
</div>
</section>

<section id="galeria">
<div class="card">
<h2>Nossas Memórias</h2>
<div class="galeria">
    <img src="fotos/foto1.jpg">
    <img src="fotos/foto2.jpg">
    <img src="fotos/foto3.jpg">
</div>
</div>
</section>

<section id="desabafos">
<div class="card">
<h2>O que eu não digo em voz alta</h2>
<textarea id="textoDesabafo"></textarea><br>
<button class="save" onclick="salvarDesabafo()">Salvar</button>
<div id="listaDesabafos"></div>
</div>
</section>

<section id="recados">
<div class="card">
<h2>Bilhetes que ficam</h2>
<input type="text" id="recadoInput">
<button class="save" onclick="salvarRecado()">Adicionar</button>
<div id="listaRecados"></div>
</div>
</section>

<section id="humor">
<div class="card">
<h2>Estado do Coração</h2>
<select id="emojiSelect">
<option>🖤</option>
<option>🥺</option>
<option>🔥</option>
<option>😴</option>
<option>😢</option>
<option>😈</option>
</select>
<button class="save" onclick="salvarHumor()">Salvar Humor</button>
<p id="humorHoje"></p>
</div>
</section>

</div>

<script>
function calcularTempo(){
    const inicio = new Date(2025,9,14,0,0,0);
    const agora = new Date();

    let meses = agora.getMonth() - inicio.getMonth() +
        12 * (agora.getFullYear() - inicio.getFullYear());

    let dias = agora.getDate() - inicio.getDate();
    if(dias < 0){
        meses--;
        const ultimoMes = new Date(agora.getFullYear(), agora.getMonth(), 0);
        dias += ultimoMes.getDate();
    }

    const horas = agora.getHours();
    const minutos = agora.getMinutes();
    const segundos = agora.getSeconds();

    document.getElementById("contadorTempo").innerText =
        meses+" meses, "+dias+" dias, "+horas+" horas, "+
        minutos+" minutos e "+segundos+" segundos 🖤";
}

setInterval(calcularTempo,1000);
calcularTempo();

function show(id){
    document.querySelectorAll("section").forEach(sec=>sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function verificarSenha(){
    if(document.getElementById("senhaInput").value==="1410"){
        document.getElementById("login").style.display="none";
        document.getElementById("conteudo").style.display="block";
    } else {
        document.getElementById("erroSenha").innerText="Senha incorreta 🖤";
    }
}

/* estrelas mantidas */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
    stars.push({x:Math.random()*canvas.width,
                y:Math.random()*canvas.height,
                radius:Math.random()*1.5,
                speed:Math.random()*0.5});
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(star=>{
        ctx.beginPath();
        ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);
        ctx.fill();
        star.y+=star.speed;
        if(star.y>canvas.height){
            star.y=0;
            star.x=Math.random()*canvas.width;
        }
    });
    requestAnimationFrame(drawStars);
}
drawStars();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcTkEQd4hysYz9X1gvT1AVrfBfDjo1W3U",
  authDomain: "nosso-universo-a50d4.firebaseapp.com",
  projectId: "nosso-universo-a50d4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let nome = localStorage.getItem("nomeUsuario");
if(!nome){
  nome = prompt("Quem está entrando? (Gabriela ou Vitória)");
  localStorage.setItem("nomeUsuario", nome);
}

window.salvarRecado = async function(){
  const texto=document.getElementById("recadoInput").value.trim();
  if(!texto) return;
  await addDoc(collection(db,"recados"),{nome,texto});
  document.getElementById("recadoInput").value="";
};

onSnapshot(collection(db,"recados"),snap=>{
  const lista=document.getElementById("listaRecados");
  lista.innerHTML="";
  snap.forEach(doc=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText=doc.data().nome+": "+doc.data().texto;
    lista.appendChild(div);
  });
});

window.salvarDesabafo = async function(){
  const texto=document.getElementById("textoDesabafo").value.trim();
  if(!texto) return;
  await addDoc(collection(db,"desabafos"),{nome,texto});
  document.getElementById("textoDesabafo").value="";
};

onSnapshot(collection(db,"desabafos"),snap=>{
  const lista=document.getElementById("listaDesabafos");
  lista.innerHTML="";
  snap.forEach(doc=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText=doc.data().nome+": "+doc.data().texto;
    lista.appendChild(div);
  });
});

window.salvarHumor = async function(){
  const emoji=document.getElementById("emojiSelect").value;
  await addDoc(collection(db,"humor"),{nome,emoji});
};

onSnapshot(collection(db,"humor"),snap=>{
  let ultimo=null;
  snap.forEach(doc=>ultimo=doc.data());
  if(ultimo){
    document.getElementById("humorHoje").innerText=
      ultimo.nome+" está se sentindo "+ultimo.emoji+" 🖤";
  }
});
</script>

</body>
</html>
